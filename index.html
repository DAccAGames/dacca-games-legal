<title>Legal — DaCCa.Games</title>
<style>
  :root{
    --ink:#241f1a; --ink-soft:#5d554b; --rule:#e0d8c9;
    --paper:#faf7f1; --gold:#a8842c; --panel:#f2ece0;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:Georgia,"Times New Roman",serif;font-size:17px;line-height:1.65;

  .sub{color:var(--ink-soft);font-size:16px;margin:0 0 36px}
  a.doc{
    display:block;text-decoration:none;color:var(--ink);
    background:var(--panel);border-left:3px solid var(--gold);
    padding:18px 22px;margin-bottom:14px;
    transition:transform .12s ease;
  }
  a.doc:hover{transform:translateX(3px)}
  a.doc strong{display:block;font-size:19px;color:var(--gold);margin-bottom:3px}
  a.doc span{font-size:15px;color:var(--ink-soft)}
  footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--rule);
    color:var(--ink-soft);font-size:14px}
  footer a{color:var(--gold)}
